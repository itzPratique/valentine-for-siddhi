<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will You Be My Valentine, Siddhi? 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(120deg, #fbc2eb, #a18cd1);
      position: relative;
    }

    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 30px;
      padding: 50px 40px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      max-width: 500px;
      width: 90%;
      position: relative;
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.8)}
      to {opacity: 1; transform: scale(1)}
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 2.8rem;
      color: #ff2d95;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    button {
      padding: 15px 30px;
      border-radius: 50px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.3s ease, background 0.3s ease;
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }

    .yes {
      background: linear-gradient(45deg, #ff4d6d, #ff7fbf);
      color: white;
    }

    .yes:hover {
      transform: scale(1.1);
      background: linear-gradient(45deg, #ff1f4a, #ff88b3);
    }

    .no {
      background: #eee;
      color: #555;
      position: relative;
    }

    .message {
      display: none;
      font-size: 20px;
      color: #ff2d95;
      margin-top: 25px;
      font-weight: 600;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      color: #ff2d95;
      animation: floatUp 5s linear infinite;
      opacity: 0.7;
    }

    @keyframes floatUp {
      from { transform: translateY(0) scale(1); opacity: 1; }
      to { transform: translateY(-120vh) scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Siddhi 💖</h1>
    <p>Every moment with you feels magical ✨<br>Will you be my Valentine? 🌹</p>

    <div class="buttons">
      <button class="yes" onclick="sayYes()">Yes 💕</button>
      <button class="no" onmouseover="moveNo(this)">No 🙈</button>
    </div>

    <div class="message" id="msg">
      Yayyy! 💖💖<br>You just made my heart super happy 🥰
    </div>
  </div>

  <script>
    function sayYes() {
      document.getElementById('msg').style.display = 'block';
      createHearts();
      createHearts();
      createHearts();
    }

    function moveNo(btn) {
      const x = Math.random() * 220 - 110;
      const y = Math.random() * 120 - 60;
      btn.style.transform = `translate(${x}px, ${y}px)`;
    }

    function createHearts() {
      for (let i = 0; i < 50; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.bottom = '-20px';
        heart.style.fontSize = Math.random() * 30 + 15 + 'px';
        heart.style.animationDuration = (3 + Math.random() * 3) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
      }
    }
  </script>

</body>
</html>
